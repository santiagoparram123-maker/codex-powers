name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate skills
        run: npm run validate:skills

      - name: Build skill index
        run: npm run build:index

      - name: Run tests
        run: npm test
